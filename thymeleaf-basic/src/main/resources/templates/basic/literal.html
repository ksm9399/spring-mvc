<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>

<body>
  <h1>리터럴</h1>
  <ul>
    <!--
      주의! 다음 주석을 풀면 예외가 발생함
      공백 없이 쭉 이어진다면 하나의 의미있는 토큰으로 인지하지만
      중간에 공백이 들어갈 시 ''(작은 따옴표) or ||(리터럴 대체)로 감싸줘야 됨
    -->
    <!-- <li>"hello world!" = <span th:text="hello world!"></span></li>-->
    <li>
      'hello' + ' world!' = <span th:text="'hello' + ' world!'"></span>
    </li>
    <li>
      'hello world!' = <span th:text="'hello world!'"></span>
    </li>
    <li>
      'hello ' + ${data} = <span th:text="'hello ' + ${data}"></span>
    </li>
    <li>
      리터럴 대체 |hello ${data}| = <span th:text="|hello ${data}|"></span>
    </li>
  </ul>
</body>

</html>
