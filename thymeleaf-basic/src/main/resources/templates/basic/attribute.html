<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>

<body>
  <h1>속성 설정</h1>
  <input type="text" name="mock" th:name="userA" />
  <h1>속성 추가</h1>
  <!-- th:attrappend : 속성 값의 뒤에 값을 추가한다 => class="text large" 공백을 추가해 줌으로 text large (공백 없으면 클래스네임이 붙어버림 - textlarge) -->
  - th:attrappend = <input type="text" class="text" th:attrappend="class=' large'" /><br />
  <!-- th:attrprepend : 속성 값의 앞에 값을 추가한다. => class="largetext" -->
  - th:attrprepend = <input type="text" class="text" th:attrprepend="class='large '" /><br />
  <!-- th:classappend : class 속성에 자연스럽게 추가한다. class="text large" -->
  - th:classappend = <input type="text" class="text" th:classappend="large" /><br />
  <h1>checked 처리</h1>
  - checked o <input type="checkbox" name="active" th:checked="true" /><br />
  - checked x <input type="checkbox" name="active" th:checked="false" /><br />
  <!-- html파일에서는 checked 속성만 있어도 체크박스에 체크가 됨, 아래의 코드는 checked="false" 줘도 체크박스에 체크가 됨 - 타임리프 적용x(순수 html) -->
  - checked=false <input type="checkbox" name="active" checked="false" /><br />
</body>

</html>
